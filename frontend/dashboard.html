<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phish-Intel AI - Dashboard</title>
</head>
<body>

    <header>
        <h1>Phish-Intel AI Dashboard</h1>
        <p>Scan results for your URL will appear below</p>
    </header>

    <main>
        <!-- Risk Summary -->
        <section>
            <div>
                <h2>Risk Summary</h2>
                <p>Risk Score: <span>0%</span></p>
                <p>Classification: <span>Safe</span></p>
                <div><!-- Risk gauge placeholder --></div>
            </div>
        </section>

        <!-- Detailed Explanation -->
        <section>
            <div>
                <h2>Detailed Explanation</h2>
                <ul>
                    <!-- ML and rule-based flags inserted here -->
                </ul>
            </div>
        </section>

        <!-- URL Metadata -->
        <section>
            <div>
                <h2>URL Metadata</h2>
                <p>Domain: <span></span></p>
                <p>Timestamp: <span></span></p>
                <p>Model Version: <span></span></p>
            </div>
        </section>

        <!-- Actions -->
        <nav>
            <a href="index.html"><button>Scan Another URL</button></a>
            <button>View History</button>
        </nav>

        <!-- History / Analytics -->
        <section>
            <div>
                <h2>Scan History</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Risk Score</th>
                            <th>Classification</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Previous scan rows inserted here -->
                    </tbody>
                </table>
                <div><!-- Pie chart placeholder --></div>
                <div><!-- Bar chart placeholder --></div>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Phish-Intel AI</p>
    </footer>

</body>
</html>
