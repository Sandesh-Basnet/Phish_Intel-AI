<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phish-Intel AI - Scan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-brand">PHISH-INTEL AI</div>
        <div class="topbar-right">
            <span><span class="status-dot"></span>System Online</span>
        </div>
    </div>

    <div class="page-wrap">

        <main>
            <section class="panel" style="max-width:600px; margin: 4rem auto;">
                <div class="panel-header">
                    <div class="wm-dot red"></div>
                    <div class="wm-dot yellow"></div>
                    <div class="wm-dot green"></div>
                    <div class="panel-title">URL SCANNER</div>
                </div>

                <div class="panel-body">
                    <div class="section-label">Scan Target</div>

                    <form action="dashboard.html" method="GET">
                        <input type="url" id="urlInput" name="url"
                               placeholder="https://example.com"
                               required
                               style="width:100%; padding:0.6rem; margin-bottom:1rem; background:#000; border:1px solid #1c3322; color:#00ff41;">
                        
                        <button type="submit" class="btn btn-primary">
                            Scan
                        </button>
                    </form>
                </div>
            </section>
        </main>

    </div>

    <footer class="site-footer">
        <span>© 2026 PHISH-INTEL AI</span>
        <span>Phishing Detection System</span>
    </footer>

</body>
</html>
